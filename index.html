<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zamanin Katmanlari - Proje</title>
    <!-- Kütüphane linkini güncelledik -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!-- uiScanning: yes yaparak tarama çerçevesini aktif ettik -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: yes;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="pumucklGorsel" src="pumuckl.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="#pumucklGorsel" position="0 0 0.1" rotation="0 0 0" width="1" height="1"></a-image>
        <a-text value="Zamanin Katmanlari" color="blue" align="center" position="0 0.7 0.1" width="2"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
