
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>AR Kitap Testi</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind;">
      <a-camera position="0 0 0"></a-camera>

      <!-- Kitap sayfası tanındığında Pumuckl görünsün -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-image src="pumuckl.png" position="0 0 0" width="1" height="1"></a-image>
      </a-entity>
    </a-scene>
  </body>
</html>
